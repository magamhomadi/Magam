<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب نسخة تجريبية</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:'Tajawal',sans-serif;
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:15px;
}
.container{
    background:#fff;
    width:100%;
    max-width:600px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.1);
    overflow:hidden;
}
header{
    background:#0056b3;
    color:#fff;
    text-align:center;
    padding:20px;
}
header h1{font-size:1.8em}
.content{padding:25px}
.form-group{margin-bottom:18px}
label{display:block;margin-bottom:6px;font-weight:bold}
input,select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:1em;
}
input:focus,select:focus{
    border-color:#007bff;
    outline:none;
}
button{
    width:100%;
    background:#25D366;
    color:#fff;
    padding:15px;
    font-size:1.2em;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
button:disabled{
    background:#999;
}
footer{
    background:#333;
    color:#fff;
    text-align:center;
    padding:15px;
    font-size:.9em;
}
</style>
</head>

<body>

<div class="container">
<header>
    <h1>طلب نسخة تجريبية</h1>
    <p>سيتم التواصل معك عبر واتساب</p>
</header>

<div class="content">
<form id="requestForm">

    <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" id="fullName" required placeholder="اسمك الكريم">
    </div>

    <div class="form-group">
        <label>رقم الهاتف</label>
        <input type="tel" id="phoneNumber" required placeholder="775123456">
    </div>

    <div class="form-group">
        <label>اختر البرنامج</label>
        <select id="programName" required>
            <option value="">-- اختر البرنامج --</option>
            <option value="docan">برنامج دكان</option>
            <option value="water">مشروع المياه</option>
            <option value="wholesale">المبيعات الجملة</option>
             <option value="wholesale"> منظم رسائل الواتساب</option>
              <option value="wholesale"> مكتبة الرسائل النصيه </option>
        </select>
    </div>

    <button type="submit" id="sendBtn">إرسال عبر واتساب</button>

</form>
</div>

<footer>
&copy; 2024 المعجم للبرمجيات
</footer>
</div>

<script>
// رقمك في واتساب
const ADMIN_PHONE = "967775715662";

// قوالب رسائل واتساب (منظمة)
const whatsappTemplates = {
    docan: {
        title: "برنامج دكان",
        desc: "إدارة المبيعات والمخزون",
    },
    water: {
        title: "مشروع المياه",
        desc: "إدارة توزيع وبيع المياه",
    },
    wholesale: {
        title: "المبيعات الجملة",
        desc: "إدارة العملاء والفواتير بالجملة",
    }
};

document.getElementById("requestForm").addEventListener("submit", function(e){
    e.preventDefault();

    const btn = document.getElementById("sendBtn");
    const name = document.getElementById("fullName").value.trim();
    let phone = document.getElementById("phoneNumber").value.trim();
    const programKey = document.getElementById("programName").value;

    if(!programKey){
        alert("يرجى اختيار البرنامج");
        return;
    }

    // تنظيف الرقم
    phone = phone.replace(/\D/g,"");

    // إضافة رمز اليمن تلقائيًا
    if(phone.length === 9){
        phone = "967" + phone;
    }

    if(phone.length < 11){
        alert("رقم الهاتف غير صحيح");
        return;
    }

    const program = whatsappTemplates[programKey];

    const message = 
`السلام عليكم 👋
أرغب بالحصول على نسخة تجريبية

📌 البرنامج: ${program.title}
📝 الوصف: ${program.desc}

👤 الاسم: ${name}
📞 الهاتف: ${phone}

بانتظار تواصلكم 🤝`;

    btn.disabled = true;
    btn.innerText = "جاري التحويل إلى واتساب...";

    const url = `https://api.whatsapp.com/send?phone=${ADMIN_PHONE}&text=${encodeURIComponent(message)}`;
    window.open(url, "_blank");

    setTimeout(()=>{
        btn.disabled = false;
        btn.innerText = "إرسال عبر واتساب";
    },3000);
});
</script>

</body>
</html>
